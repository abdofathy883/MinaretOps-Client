<section class="container py-4">
  <!-- Alert Messages -->
  @if (alertMessage) {
    <div class="alert" [class]="'alert-' + alertType">
      {{ alertMessage }}
      <button class="alert-close" (click)="closeAlert()">×</button>
    </div>
  }

  <div class="card">
    <div class="card-header">
      <h3>اضافة عميل محتمل</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="leadForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="businessName" class="form-label">اسم العميل</label>
            <span class="text-danger me-2">*</span>
            <input
              id="businessName"
              name="businessName"
              class="form-control"
              type="text"
              formControlName="businessName"
              [class.is-invalid]="hasError('businessName')"
            />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="whatsAppNumber" class="form-label">رقم الواتساب</label>
            <span class="text-danger me-2">*</span>
            <input
              type="text"
              id="whatsAppNumber"
              name="whatsAppNumber"
              class="form-control"
              formControlName="whatsAppNumber"
              [class.is-invalid]="hasError('whatsAppNumber')"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="country" class="form-label">البلد</label>
            <select
              name="country"
              id="country"
              class="form-select"
              formControlName="country"
            >
              <option value="">اختر البلد</option>
              <option value="Egypt">مصر</option>
              <option value="Saudi Arabia">السعودية</option>
              <option value="UAE">الإمارات</option>
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="occupation" class="form-label">المجال</label>
            <input
              type="text"
              id="occupation"
              name="occupation"
              class="form-control"
              formControlName="occupation"
              [class.is-invalid]="hasError('occupation')"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="currentLeadStatus" class="form-label"
              >حالة العميل الحالية</label
            >
            <select
              id="currentLeadStatus"
              class="form-select"
              formControlName="currentLeadStatus"
              [class.is-invalid]="hasError('currentLeadStatus')"
            >
              <option disabled selected>اختر الحالة</option>
              <option [ngValue]="0">عميل جديد</option>
              <option [ngValue]="1">اتصال أولي</option>
              <option [ngValue]="2">مهتم</option>
              <option [ngValue]="3">اجتماع</option>
              <option [ngValue]="4">محتمل</option>
              <option [ngValue]="5">Deal</option>
              <option [ngValue]="6">غير محتمل</option>
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="interestLevel" class="form-label">درجة الاهتمام</label>
            <select
              name="interestLevel"
              id="interestLevel"
              class="form-select"
              formControlName="interestLevel"
              [class.is-invalid]="hasError('interestLevel')"
            >
              <option disabled selected>اختر درجة الاهتمام</option>
              <option [ngValue]="0">منخفض</option>
              <option [ngValue]="1">متوسط</option>
              <option [ngValue]="2">مرتفع</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="contactStatus" class="form-label">حالة التواصل</label>
            <select
              name="contactStatus"
              id="contactStatus"
              class="form-select"
              formControlName="contactStatus"
              [class.is-invalid]="hasError('contactStatus')"
            >
              <option disabled selected>اختر الحالة</option>
              <option [ngValue]="0">لم يتم التواصل بعد</option>
              <option [ngValue]="1">تم التواصل بدون رد</option>
              <option [ngValue]="2">تم الاتصال وتم الرد</option>
              <option [ngValue]="3">الرقم غير صحيح</option>
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="leadSource" class="form-label">المصدر</label>
            <select
              id="leadSource"
              class="form-select"
              formControlName="leadSource"
              [class.is-invalid]="hasError('leadSource')"
            >
              <option disabled [ngValue]="null">اختر المصدر</option>
              <option [ngValue]="0">Facebook</option>
              <option [ngValue]="1">Instagram</option>
              <option [ngValue]="2">LinkedIn</option>
              <option [ngValue]="3">Referral</option>
              <option [ngValue]="4">Google Maps</option>
              <option [ngValue]="5">Website</option>
              <option [ngValue]="6">Freelance Platforms</option>
            </select>
          </div>
        </div>

        @if (isFreelancePlatforms) {
          <div class="mb-3">
            <label for="freelancePlatform" class="form-label">المنصة</label>
            <select
              id="freelancePlatform"
              class="form-select"
              formControlName="freelancePlatform"
            >
              <option [ngValue]="null" disabled>اختر المنصة</option>
              <option [ngValue]="0">Bahr</option>
              <option [ngValue]="1">Upwork</option>
            </select>
          </div>
        }

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="responsibility" class="form-label">المسئولية</label>
            <select
              name="responsibility"
              id="responsibility"
              class="form-select"
              formControlName="responsibility"
            >
              <option [ngValue]="0">المسئول وصاحب القرار</option>
              <option [ngValue]="1">المسئول وليس صاحب القرار</option>
              <option [ngValue]="2">ليس المسئول</option>
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="budget" class="form-label">الميزانية</label>
            <select
              name="budget"
              id="budget"
              class="form-select"
              formControlName="budget"
            >
              <option [ngValue]="0">أقل</option>
              <option [ngValue]="1">مساوي</option>
              <option [ngValue]="2">أكثر</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="timeline" class="form-label">مدة التنفيذ</label>
            <select
              name="timeline"
              id="timeline"
              class="form-select"
              formControlName="timeline"
            >
              <option [ngValue]="0">أقل</option>
              <option [ngValue]="1">مساوي</option>
              <option [ngValue]="2">أكثر</option>
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="needsExpectation" class="form-label">المتطلبات</label>
            <select
              name="needsExpectation"
              id="needsExpectation"
              class="form-select"
              formControlName="needsExpectation"
            >
              <option [ngValue]="0">أقل</option>
              <option [ngValue]="1">مساوي</option>
              <option [ngValue]="2">أكثر</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label for="meetingDate" class="form-label">تاريخ الاجتماع</label>
            <input
              type="datetime-local"
              id="meetingDate"
              class="form-control"
              formControlName="meetingDate"
              [class.is-invalid]="hasError('meetingDate')"
            />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label for="followUpTime" class="form-label">تاريخ المتابعة</label>
            <input
              type="datetime-local"
              id="followUpTime"
              class="form-control"
              formControlName="followUpTime"
              [class.is-invalid]="hasError('followUpTime')"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="assignedTo" class="form-label">تعيين الى</label>
          <select
            id="assignedTo"
            class="form-select"
            formControlName="assignedTo"
            [class.is-invalid]="hasError('assignedTo')"
          >
            <option disabled selected>اختر الموظف</option>
            @for (user of employees; track user.id) {
              <option [value]="user.id">
                {{ user.firstName + " " + user.lastName }}
              </option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label for="servicesInterestedIn" class="form-label"
            >الخدمات المطلوبة</label
          >
          <select
            multiple
            name="servicesInterestedIn"
            id="servicesInterestedIn"
            class="form-select"
            formControlName="servicesInterestedIn"
            [class.is-invalid]="hasError('servicesInterestedIn')"
          >
            <option disabled selected>اختر الخدمات المطلوبة</option>
            @for (service of availableServices; track service.id) {
              <option [value]="service.id">{{ service.title }}</option>
            }
          </select>
        </div>

        <!-- Compact fields for booleans -->
        <div class="row">
          <div class="col-6 mb-3">
            <div class="form-check form-switch">
              <label class="form-check-label" for="quotationSent"
                >تم إرسال عرض سعر
                <input
                  class="form-check-input"
                  type="checkbox"
                  role="switch"
                  id="quotationSent"
                  formControlName="quotationSent"
                />
              </label>
            </div>
          </div>
        </div>

        <!-- Notes (array: 0, 1, or many; one editor shown by default) -->
        <div class="mb-3" formArrayName="notes">
          <label class="form-label">الملاحظات</label>
          @for (ctrl of notesFormArray.controls; track $index) {
            <div class="notes-editor-wrapper mb-3">
              <label class="form-label small text-muted">ملاحظة {{ $index + 1 }}</label>
              <ngx-editor-menu [editor]="getNoteEditor($index)" [toolbar]="toolbar"></ngx-editor-menu>
              <ngx-editor
                [editor]="getNoteEditor($index)"
                [placeholder]="'اكتب هنا...'"
                [formControlName]="$index"
              ></ngx-editor>
              @if (notesFormArray.length > 1) {
                <button type="button" class="btn btn-outline-danger btn-sm mt-1" (click)="removeNote($index)">
                  حذف الملاحظة
                </button>
              }
            </div>
          }
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="addNote()">
            إضافة ملاحظة
          </button>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 mt-3"
          [disabled]="isLoading"
        >
          @if (isLoading) {
            <span
              class="spinner-border spinner-border-sm"
              role="status"
              aria-hidden="true"
            ></span>
            جارٍ الاضافة...
          } @else {
            اضافة
          }
        </button>
      </form>
    </div>
  </div>
</section>
